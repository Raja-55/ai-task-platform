name: Build and Deploy (GitOps)

on:
  push:
    branches: [main]

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Compute image tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ steps.meta.outputs.tag }}

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ steps.meta.outputs.tag }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=https://staging.ai-task.local
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ steps.meta.outputs.tag }}

  update_infra_repo:
    runs-on: ubuntu-latest
    needs: [build_push]
    permissions:
      contents: write
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags (staging overlay)
        uses: mikefarah/yq@v4.45.1
        with:
          cmd: |
            yq -i '.images[] |= (select(.name == "docker.io/YOUR_DOCKERHUB/ai-task-backend").newTag = "${{ needs.build_push.outputs.tag }}")' infra/k8s/overlays/staging/kustomization.yaml
            yq -i '.images[] |= (select(.name == "docker.io/YOUR_DOCKERHUB/ai-task-worker").newTag = "${{ needs.build_push.outputs.tag }}")' infra/k8s/overlays/staging/kustomization.yaml
            yq -i '.images[] |= (select(.name == "docker.io/YOUR_DOCKERHUB/ai-task-frontend").newTag = "${{ needs.build_push.outputs.tag }}")' infra/k8s/overlays/staging/kustomization.yaml

      - name: Commit and push
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/kustomization.yaml
          git commit -m "chore: bump images to ${{ needs.build_push.outputs.tag }}" || exit 0
          git push
