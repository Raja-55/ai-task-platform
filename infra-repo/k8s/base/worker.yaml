apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: docker.io/YOUR_DOCKERHUB/ai-task-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ai-task-config
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: WORKER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "print('ok')"]
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["python", "-c", "print('ok')"]
            initialDelaySeconds: 5
            periodSeconds: 20
